<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zona Arcade - Catálogo</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link rel="stylesheet" href="CSS/style3.css">
</head>

<body id="fondo">

    <h1 id="titulo">Zona Arcade Juegos</h1>

    <table id="tabla-juegos">
        <thead>
            <tr>
                <th>Videojuego</th>
                <th>Precio</th>
                <th>Imagen</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>The Last of Us Part I</td>
                <td>S/180</td>
                <td><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT11rzFBwzvq4HpLrNNqiUekBWHdDmA5Nbkjw&s"
                        width="80"></td>
                <td><button onclick="anotar('The Last of Us Part I - S/180')">Agregar</button></td>
            </tr>
            <tr>
                <td>Call of Duty</td>
                <td>S/103.60</td>
                <td><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQX_NNYSZ_mxvThoaJq5FBSGId7mS-5ffnZTA&s"
                        width="80"></td>
                <td><button onclick="anotar('Call of Duty - S/103.60')">Agregar</button></td>
            </tr>
            <tr>
                <td>EA Sports FC 26</td>
                <td>S/170</td>
                <td><img src="https://m.media-amazon.com/images/I/81aMKJCm9BL.jpg" width="80"></td>
                <td><button onclick="anotar('EA Sports FC 26 - S/170')">Agregar</button></td>
            </tr>
            <tr>
                <td>Uncharted 4</td>
                <td>S/98</td>
                <td><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTgr3Q4UhRQwqNgaV-CjUGNIWzrY8BZSqXgeg&s"
                        width="80"></td>
                <td><button onclick="anotar('Uncharted 4 - S/98')">Agregar</button></td>
            </tr>
            <tr>
                <td>Mario Kart 8 Deluxe</td>
                <td>S/190</td>
                <td><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSKCP6yAVnEQ5Ac8NW2VA8iJpuAzts1E4rDkQ&s"
                        width="80"></td>
                <td><button onclick="anotar('Mario Kart 8 Deluxe - S/190')">Agregar</button></td>
            </tr>
            <tr>
                <td>Zelda: Tears of the Kingdom</td>
                <td>S/179</td>
                <td><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSWhz83FbYqx0luNHuG4K5SUqQRWNBHqEhSog&s"
                        width="80"></td>
                <td><button onclick="anotar('Zelda: TOTK - S/179')">Agregar</button></td>
            </tr>
            <tr>
                <td>GTA V</td>
                <td>S/134.47</td>
                <td><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT7I8YP2L0vXjBlm30KiA5vmbDGANoJhev3Ng&s"
                        width="80"></td>
                <td><button onclick="anotar('GTA V - S/134.47')">Agregar</button></td>
            </tr>
        </tbody>
    </table>

    <div id="seccion-lista">
        <h2>Mi Lista de Compra</h2>
        <textarea id="miLista" readonly placeholder="Tus juegos aparecerán aquí..."></textarea>

        <div class="botones-lista">
            <button type="button" onclick="finalizarCompra()" class="btn-comprar">Finalizar Compra</button>
            <button type="button" onclick="borrarLista()" class="btn-borrar">Vaciar Lista</button>
        </div>
    </div>

    <script>
        function anotar(juego) {
            Swal.fire({
                title: "¡Agregado!",
                text: "Se añadió a tu lista",
                icon: "success",
                timer: 800,
                showConfirmButton: false
            });
            document.getElementById('miLista').value += "• " + juego + "\n";
        }

        function finalizarCompra() {
            let contenido = document.getElementById('miLista').value;
            if (contenido === "") {
                Swal.fire({
                    title: "Lista vacía",
                    text: "Agrega juegos antes de comprar",
                    icon: "warning"
                });
            } else {
                Swal.fire({
                    title: "¡Compra Exitosa!",
                    text: "Tu pedido ha sido procesado correctamente.",
                    icon: "success"
                });
                borrarLista();
            }
        }

        function borrarLista() {
            document.getElementById('miLista').value = "";
        }
    </script>

</body>

</html>
