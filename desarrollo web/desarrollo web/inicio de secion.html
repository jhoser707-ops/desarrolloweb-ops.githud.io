<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zona Gamer</title>
    <link rel="stylesheet" href="CSS/style2.css">
</head>

<body>

    <!-- Botón para abrir -->
    <a href="#modal" id="abrir">Iniciar sesión</a>

    <!-- Modal -->
    <div id="modal" class="modal">

        <div class="modal-contenido">

            <!-- Botón cerrar -->
            <a href="#" class="cerrar">×</a>

            <form id="formulario" action="inicio.html" method="post">

                <h2 id="titulo">Iniciar sesión</h2>

                <br><br>

                <input id="usuario" name="usuario" type="text" placeholder="Usuario" required />

                <br><br>

                <input id="password" name="password" type="password" placeholder="Contraseña" required />

                <br><br>

                <input id="boton" type="submit" value="Ingresar" />

                <p id="registro-texto">
                    ¿No tienes cuenta?
                    <a id="registro-link" href="registro.html">Regístrate aquí</a>
                </p>

            </form>

        </div>

    </div>

</body>

</html>
