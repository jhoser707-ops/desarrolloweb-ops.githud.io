<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito</title>
    <link rel="stylesheet" href="CSS/style5.css">
</head>

<body id="fondo">

    <form id="formulario" action="https://www.zonagamer.com/repite.php" method="post">

        <label id="titulo">Ingrese los datos de su compra</label>

        <br><br>

        <label class="subtitulo">Seleccione su juego</label>

        <select id="selectJuego" name="juego" required>
            <option value="">-- Selecciona un juego --</option>
            <option value="cod">Call of Duty - S/103.60</option>
            <option value="lastofus">The Last of Us - S/180</option>
            <option value="gtav">GTA V - S/134.47</option>
            <option value="zelda">Zelda - S/179</option>
            <option value="mario">Mario - S/190</option>
            <option value="uncharted">Uncharted - S/98</option>
            <option value="ea">EA Sports - S/170</option>
        </select>

        <br><br>

        <input id="nombre" type="text" name="nombre" placeholder="Nombre y Apellidos" required>

        <br><br>

        <input id="direccion" type="text" name="direccion" placeholder="Dirección" required>

        <br><br>

        <input id="telefono" type="tel" name="telefono" placeholder="Nro de teléfono" required>

        <br><br>

        <input id="tarjeta" type="number" name="tarjeta" placeholder="Nro de tarjeta" required>

        <br><br>

        <input id="codigo" type="number" name="codigo" placeholder="Código de seguridad" required>

        <br><br>

        <label class="subtitulo">Fecha de vencimiento</label>

        <br>

        <input id="fecha" type="date" name="fecha" required>

        <br><br>

        <input id="boton" type="submit" value="Comprar">

    </form>

</body>

</html>
